<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Details Management</title>
    <link rel="stylesheet" type="text/css" href="./css/detailsManagement.css">
    <script src="./js/detailsManagement.js"></script>
</head>

<body >
    <div class="form-container">
        <div>
            <label for="professorName">Professor Name:</label>
            <input type="text" id="professorName" oninput="searchProfessor()">
            <div id="suggestionBox" class="suggestions"></div>
        </div>

        <div>
            <label for="courseLoad">Professor Course Load (SSFW):</label>
            <input type="text" id="courseLoad" pattern="\d{4}"
                title="Enter course load as SSFF (Spring, Summer, Fall, Winter)">
        </div>

        <div>
            <label for="courseLoad">Professor Type:</label>
            <input type="text" id="profType" pattern="\d{4}" title="Professor Title">
        </div>

        <div id="availability">
            <label>Professor Availability:</label>
            <button type="button" id="addTimeSlot" onclick="addAvailabilitySlot()">Add Time Slot</button>
            <div id="timeSlots"></div>
        </div>

        <button type="button" id="submitBtn" onclick="submitProfessorDetails()">Submit</button>
    </div>

    <div id="professorsContainer"></div>


</body>

</html>
